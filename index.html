<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哲学者・思想家50選</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<link rel="icon" href="./icon.png" type="image/png">
<link rel="apple-touch-icon" href="./icon.png">
</head>
<body>

<!-- 固定背景の花装飾 -->
<div class="deco-flowers" aria-hidden="true">
  <svg width="100%" height="100%" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" opacity="0.06">
    <!-- ダリア 左上 -->
    <g transform="translate(60,80) rotate(-15)">
      <circle cx="0" cy="0" r="8" fill="#c4506a"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8" transform="rotate(45)"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8" transform="rotate(90)"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8" transform="rotate(135)"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8" transform="rotate(180)"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8" transform="rotate(225)"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8" transform="rotate(270)"/>
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#c4506a" opacity="0.8" transform="rotate(315)"/>
    </g>
    <!-- ヒマワリ 右上 -->
    <g transform="translate(740,120) rotate(10)">
      <circle cx="0" cy="0" r="18" fill="#8b6000"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(30)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(60)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(90)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(120)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(150)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(180)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(210)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(240)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(270)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(300)"/>
      <ellipse cx="0" cy="-32" rx="9" ry="18" fill="#e8a020" opacity="0.9" transform="rotate(330)"/>
    </g>
    <!-- ラナンキュラス 右下 -->
    <g transform="translate(760,750) rotate(5)">
      <circle cx="0" cy="0" r="6" fill="#e07090"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(40)"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(80)"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(120)"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(160)"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(200)"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(240)"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(280)"/>
      <ellipse cx="0" cy="-16" rx="6" ry="11" fill="#e07090" opacity="0.7" transform="rotate(320)"/>
    </g>
    <!-- 小さいダリア 左下 -->
    <g transform="translate(40,800) rotate(-5)">
      <circle cx="0" cy="0" r="5" fill="#c4506a"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8" transform="rotate(45)"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8" transform="rotate(90)"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8" transform="rotate(135)"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8" transform="rotate(180)"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8" transform="rotate(225)"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8" transform="rotate(270)"/>
      <ellipse cx="0" cy="-14" rx="5" ry="9" fill="#c4506a" opacity="0.8" transform="rotate(315)"/>
    </g>
    <!-- 葉っぱたち -->
    <ellipse cx="100" cy="200" rx="8" ry="20" fill="#7a9e6e" opacity="0.6" transform="rotate(-30 100 200)"/>
    <ellipse cx="700" cy="400" rx="6" ry="16" fill="#7a9e6e" opacity="0.5" transform="rotate(20 700 400)"/>
    <ellipse cx="50" cy="500" rx="5" ry="14" fill="#7a9e6e" opacity="0.4" transform="rotate(-10 50 500)"/>
    <ellipse cx="750" cy="600" rx="7" ry="18" fill="#7a9e6e" opacity="0.5" transform="rotate(15 750 600)"/>
  </svg>
</div>

<!-- HEADER -->
<header>
  <div class="header-flowers" aria-hidden="true">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(20,20) rotate(-20)" opacity="0.5">
        <circle cx="0" cy="0" r="5" fill="#c4506a"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a" transform="rotate(45)"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a" transform="rotate(90)"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a" transform="rotate(135)"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a" transform="rotate(180)"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a" transform="rotate(225)"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a" transform="rotate(270)"/>
        <ellipse cx="0" cy="-13" rx="5" ry="9" fill="#c4506a" transform="rotate(315)"/>
      </g>
    </svg>
  </div>
  <div class="header-inner">
    <p class="eyebrow">✿ Philosophers Comparison ✿</p>
    <h1><em>哲学者・思想家</em><br>比較表</h1>
    <div class="ornament">🌸</div>
  </div>
</header>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="dot" style="background:var(--claude)"></div>Claude</div>
  <div class="legend-item"><div class="dot" style="background:var(--chatgpt)"></div>ChatGPT</div>
  <div class="legend-item"><div class="dot" style="background:var(--gemini)"></div>Gemini</div>
  <div class="legend-item"><div class="dot" style="background:var(--copilot)"></div>Copilot</div>
  <div class="legend-item"><div class="dot" style="background:var(--grok)"></div>Grok</div>
  <div class="legend-item"><div class="dot" style="background:var(--spark)"></div>Genspark</div>
  <div class="legend-item" style="margin-left:0.5rem">
    <span style="font-size:0.8rem">🌸</span>
    <span style="font-size:0.68rem;color:var(--dahlia)">= 講義あり</span>
  </div>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">表示</span>
    <button class="fbtn active" data-filter="all">すべて</button>
    <button class="fbtn" data-filter="consensus">全AI一致</button>
    <button class="fbtn" data-filter="unique">独自選出</button>
    <div class="fdivider"></div>
    <span class="filter-label">AI別</span>
    <button class="fbtn" data-ai="claude">Claude</button>
    <button class="fbtn" data-ai="chatgpt">ChatGPT</button>
    <button class="fbtn" data-ai="gemini">Gemini</button>
    <button class="fbtn" data-ai="copilot">Copilot</button>
    <button class="fbtn" data-ai="grok">Grok</button>
    <button class="fbtn" data-ai="spark">Genspark</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div><span class="stat-num" id="stat-shown">—</span><span class="stat-label"> 人表示中</span></div>
  <div><span class="stat-num" id="stat-consensus">—</span><span class="stat-label"> 人全AI一致</span></div>
  <div><span class="stat-num" id="stat-unique">—</span><span class="stat-label"> 人独自選出</span></div>
</div>

<!-- GRID -->
<div class="grid-wrap" id="grid-wrap"></div>

<!-- INSIGHTS -->
<div class="insights-wrap">
  <div class="insights-title">🌼 Insights</div>
  <div class="insights-grid" id="insights-grid"></div>
</div>

<footer>「哲学とは死の練習である」— ソクラテス 🌸</footer>

<!-- POPUP -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup" id="popup">
    <div class="popup-handle"></div>
    <div class="popup-flower" id="popup-flower">🌸</div>
    <div class="popup-name" id="popup-name"></div>
    <div class="popup-name-en" id="popup-name-en"></div>
    <div class="popup-label">AIの講義を選んでください</div>
    <div class="popup-buttons" id="popup-buttons"></div>
    <button class="popup-close" id="popup-close">閉じる</button>
  </div>
</div>

<!-- JS: データを先に読み込み、次にロジック -->
<script src="./philosophers-data.js"></script>
<script src="./main.js"></script>

</body>
</html>
